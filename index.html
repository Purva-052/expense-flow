<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/src/assets/devstree-white-round.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/src/assets/devstree-white-round.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/devstree-white-round.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/devstree-white-round.svg"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Resource Management</title>
    <meta name="title" content="Resource Management" />
    <meta name="description" content="Resource Management" />

    <!-- Open Graph / Facebook -->

    <meta property="og:title" content="Resource Management" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/public/fonts/poppins.regular.ttf" />

    <meta name="theme-color" content="#fff" />
    <script>
      (function () {
        try {
          const mode = localStorage.getItem("mode") || "light";
          const supportDarkMode = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          if (mode === "dark" || (mode === "system" && supportDarkMode)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="group/body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
